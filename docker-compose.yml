version: '3.8'
services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin_user
      MINIO_ROOT_PASSWORD: admin_password
    command: server /data --console-address ":9001"

  webapp:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=admin_user
      - MINIO_ROOT_PASSWORD=admin_password
    volumes:
      - ./my_block_data:/mnt/block_volume
      
    depends_on:
      - minio
